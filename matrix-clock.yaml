esphome:
  name: matrix-clock
  friendly_name: Matrix Clock

esp32:
  board: esp32-c3-devkitm-1
  framework:
    type: esp-idf

# --- Global variables ---
globals:
  - id: current_tz
    type: std::string
    restore_value: yes
    initial_value: '"GMT-4"'
  - id: display_rotation
    type: int
    restore_value: yes
    initial_value: '0'

# --- Network and system ---
logger:
improv_serial:
captive_portal:
api:
  reboot_timeout: 0s


web_server:
  port: 80
  local: true

wifi:
  ap:
    ssid: "Matrix-Clock-Setup"
  reboot_timeout: 0s # Не перезагружаться, если пропал Wi-Fi

time:
  - platform: sntp
    id: sntp_time
    timezone: "GET-4" # Set for you region
    update_interval: 1h # Sync every 1 hour, not every 5 minutes

# --- UI (WEB) ---
select:
  - platform: template
    name: "Timezone"
    id: timezone_select
    optimistic: true
    restore_value: true
    options:
      - "GMT-3 (Moscow)"
      - "GMT-4 (Tbilisi)"
      - "GMT-5 (Almaty)"
    initial_option: "GMT-4 (Tbilisi)"
    on_value:
      then:
        - lambda: |-
            std::string raw_tz = x.substr(0, 5);
            id(current_tz) = raw_tz;
            setenv("TZ", raw_tz.c_str(), 1);
            tzset();
  - platform: template
    name: "Display Rotation"
    id: rotation_select
    optimistic: true
    restore_value: true
    options:
      - "0°"
      - "90°"
      - "180°"
      - "270°"
    initial_option: "0°"
    on_value:
      then:
        - lambda: |-
            if (x == "0°") id(display_rotation) = 0;
            else if (x == "90°") id(display_rotation) = 90;
            else if (x == "180°") id(display_rotation) = 180;
            else if (x == "270°") id(display_rotation) = 270;

        - component.update: matrix_display

number:
  - platform: template
    name: "Ok-to-wake Hour"
    id: wake_hour
    min_value: 0
    max_value: 23
    mode: box
    optimistic: true
    restore_value: true
    initial_value: 7
    step: 1

  - platform: template
    name: "Bedtime Hour"
    id: bed_hour
    min_value: 0
    max_value: 23
    mode: box
    optimistic: true
    restore_value: true
    initial_value: 21
    step: 1

# --- Hardware (matrix) ---
light:
  - platform: esp32_rmt_led_strip
    id: led_matrix
    pin: GPIO3
    num_leds: 64
    rgb_order: GRB
    chipset: WS2812
    internal: true

display:
  - platform: addressable_light
    id: matrix_display
    addressable_light_id: led_matrix
    width: 8
    height: 8
    update_interval: 1s
    pixel_mapper: |-
      int nx = x;
      int ny = y;
      int rotation = id(display_rotation);

      if (rotation == 90) {
        nx = 7 - y;
        ny = x;
      } else if (rotation == 180) {
        nx = 7 - x;
        ny = 7 - y;
      } else if (rotation == 270) {
        nx = y;
        ny = 7 - x;
      }

      // If matrix is snake-style
      // return (ny % 2 == 0) ? (ny * 8 + nx) : (ny * 8 + (7 - nx));

      return (ny * 8) + nx; // Normal mapping

    lambda: |-
      auto time = id(sntp_time).now();

      // 1. Check whether time is valid
      bool time_is_set = time.is_valid() || time.year > 2020;

      if (!time_is_set) {
        // Start after powerup: wait for Wi-Fi
        it.fill(Color(0, 0, 100));
        if ((millis() / 500) % 2 == 0) it.draw_pixel_at(0, 0, Color(200, 100, 0)); // Оранжевая точка ожидания
        return;
      }

      if (!time.is_valid()) {
         it.draw_pixel_at(7, 0, Color(50, 0, 0)); // Крошечная красная точка - "нет связи, но время идет"
      }

      // 2. Ok-to-wake logic
      int cur_h = time.hour;
      int wake = (int)id(wake_hour).state;
      int bed = (int)id(bed_hour).state;
      bool is_night = (bed > wake) ? (cur_h >= bed || cur_h < wake) : (cur_h >= bed && cur_h < wake);

      it.fill(is_night ? Color(30, 0, 0) : Color(0, 70, 0));

      // 3. Prepare digits (12-hour format)
      int h = time.hour % 12;
      if (h == 0) h = 12;
      int d1 = h / 10;
      int d2 = h % 10;

      // Font glyphs 5x7
      auto draw_5x7 = [&](int x_off, int num) {
        static const uint8_t g[10][7] = {
          {0x70,0x88,0x88,0x88,0x88,0x88,0x70}, {0x20,0x60,0x20,0x20,0x20,0x20,0x70},
          {0x70,0x88,0x08,0x30,0x40,0x80,0xf8}, {0x70,0x88,0x08,0x30,0x08,0x88,0x70},
          {0x10,0x30,0x50,0x90,0xf8,0x10,0x10}, {0xf8,0x80,0xf0,0x08,0x08,0x88,0x70},
          {0x30,0x40,0xf0,0x88,0x88,0x88,0x70}, {0xf8,0x08,0x10,0x20,0x40,0x40,0x40},
          {0x70,0x88,0x70,0x88,0x88,0x88,0x70}, {0x70,0x88,0x88,0x78,0x08,0x10,0x60}
        };
        for (int y = 0; y < 7; y++) {
          for (int x = 0; x < 5; x++) {
            if ((g[num][y] >> (7 - x)) & 1) it.draw_pixel_at(x_off + x, y, Color::BLACK);
          }
        }
      };

      // 4. Clock draw
      if (d1 == 1) {
        draw_5x7(-1, d1); // Draw 1 maximum to the left
        draw_5x7(3, d2); // Draw second digiit starting frolm 3th pixel
      } else {
        draw_5x7(1, d2);
      }

      // 5. Progress bar (8 pixels for 60 minutes)
      int progress = time.minute / 7.5;
      for (int x = 0; x <= progress; x++) {
        it.draw_pixel_at(x, 7, Color::BLACK);
      }
