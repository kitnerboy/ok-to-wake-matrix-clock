esphome:
  name: matrix-clock
  friendly_name: Matrix Clock

esp32:
  board: esp32-c3-devkitm-1
  framework:
    type: esp-idf # Рекомендуется для C3

# 1. Глобальные переменные должны быть ВЫШЕ всего, где они используются
globals:
  - id: current_tz
    type: std::string
    restore_value: yes
    initial_value: '"GMT-4"'

# 1. Добавляем веб-сервер (обязательно для работы интерфейса)
web_server:
  port: 80

# 2. Настраиваем Wi-Fi с резервной точкой доступа
wifi:
  # Если не подключился за 10 секунд — запускаем AP
  ap:
    ssid: "Matrix-Clock-Setup"
    password: "" # Можно оставить пустым для удобства

# 3. Включаем сам портал
captive_portal:

logger:

# 4. Позволяет настраивать Wi-Fi через браузер по кабелю (Chrome/Edge)
improv_serial:

# Используем компонент для управления часовыми поясами через веб
select:
  - platform: template
    name: "Timezone"
    id: timezone_select
    optimistic: true
    restore_value: true
    options:
      - "GMT-3 (Moscow)"
      - "GMT-4 (Tbilisi)"
      - "GMT-5 (Almaty)"
    initial_option: "GMT-4 (Tbilisi)"
    on_value:
      then:
        - lambda: |-
            // Нам нужно вырезать только "GMT-X" из всей строки "GMT-X (City)"
            // Берем первые 5 символов строки
            std::string raw_tz = x.substr(0, 5); 
            
            id(current_tz) = raw_tz;
            setenv("TZ", raw_tz.c_str(), 1);
            tzset();
            ESP_LOGI("main", "Timezone updated to: %s", raw_tz.c_str());

# Получаем точное время
time:
  - platform: sntp
    id: sntp_time
    timezone: "GET-4" # Настройте под свой регион

# Настраиваем светодиоды как "свет"
light:
  - platform: esp32_rmt_led_strip
    rgb_order: GRB
    pin: GPIO3
    num_leds: 64
    id: led_matrix
    internal: true
    name: "Matrix Display"
    chipset: WS2812

# Превращаем светодиоды в дисплей
display:
  - platform: addressable_light
    id: matrix_display
    addressable_light_id: led_matrix
    width: 8
    height: 8
    update_interval: 1s
    
    # Маппинг: большинство матриц идут "змейкой". 
    # Если цифры будут отображаться криво, этот блок нужно будет подправить.
    pixel_mapper: |-
      return (y * 8) + x;

    lambda: |-
      it.fill(Color(0, 40, 0)); // Зеленый фон

      auto time = id(sntp_time).now();
      
      // --- ИНДИКАЦИЯ ОЖИДАНИЯ ---
      if (!time.is_valid()) {
        // Мигающая точка в правом нижнем углу (7,7)
        // Меняет состояние каждую секунду
        it.fill(Color::BLACK); 
        if ((id(matrix_display).get_update_interval() * (millis() / 1000)) % 2 == 0) {
          it.draw_pixel_at(7, 7, Color(255, 0, 0));
        }
        return; 
      }

      // Конвертируем в 12-часовой формат
      int h = time.hour % 12;
      int tens_of_minutes = time.minute / 8;

      if (h == 0) h = 12; 

      int d1 = h / 10; // Десятки
      int d2 = h % 10; // Единицы

      auto draw_5x7 = [&](int x_off, int num) {
        static const uint8_t g[10][8] = {
          {0x70,0x88,0x88,0x88,0x88,0x88,0x70}, // 0
          {0x20,0x60,0x20,0x20,0x20,0x20,0x70}, // 1
          {0x70,0x88,0x08,0x30,0x40,0x80,0xf8}, // 2
          {0x70,0x88,0x08,0x30,0x08,0x88,0x70}, // 3
          {0x10,0x30,0x50,0x90,0xf8,0x10,0x10}, // 4
          {0xf8,0x80,0xf0,0x08,0x08,0x88,0x70}, // 5
          {0x30,0x40,0xf0,0x88,0x88,0x88,0x70}, // 6
          {0xf8,0x08,0x10,0x20,0x40,0x40,0x40}, // 7
          {0x70,0x88,0x70,0x88,0x88,0x88,0x70}, // 8
          {0x70,0x88,0x88,0x78,0x08,0x10,0x60}  // 9
        };
        for (int y = 0; y < 8; y++) {
          for (int x = 0; x < 5; x++) {
            if ((g[num][y] >> (7 - x)) & 1) it.draw_pixel_at(x_off + x, y, Color::BLACK);
          }
        }
      };

      if (d1 == 1) {
        // Если час 10, 11 или 12 - рисуем узкую единицу слева и цифру справа
        // Узкая единица (2 пикселя шириной)
        draw_5x7(-1, d1); // Рисуем 0, 1 или 2 начиная с 3-го пикселя
        draw_5x7(3, d2); // Рисуем 0, 1 или 2 начиная с 3-го пикселя
      } else {
        // Если час от 1 до 9 - рисуем одну цифру по центру (с отступом 1 или 2)
        draw_5x7(1, d2);
      }

      // 3. Рисуем полоску минут в нижней строке (y = 7)
      for (int x = 0; x < tens_of_minutes; x++) {
        it.draw_pixel_at(x, 7, Color::BLACK);
      }