name: Build ESPHome Firmware

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install ESPHome
        run: pip install esphome

      - name: Build Firmware
        run: esphome compile matrix-clock.yaml

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: matrix-clock-firmware
          # Путь к скомпилированному файлу в структуре ESPHome
          path: .esphome/build/matrix-clock/.pioenvs/matrix-clock/firmware.bin