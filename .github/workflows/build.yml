name: Build ESPHome Firmware

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Cache ESPHome
        uses: actions/cache@v3
        with:
          path: ~/.esphome
          key: esphome-cache
      - name: Build Firmware
        uses: esphome/build-action@v2
        id: esphome-build
        with:
          yaml_file: matrix-clock.yaml
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: firmware
          path: ${{ steps.esphome-build.outputs.name }}/firmware.bin